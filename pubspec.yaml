name: todo_app

description: A modern Flutter Todo List application with clean architecture.

publish_to: 'none'

version: 1.0.0+1



environment:

  sdk: '>=3.2.0 <4.0.0'



dependencies:

  flutter:

    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  firebase_core: ^3.13.0

  firebase_auth: ^5.5.3

  cloud_firestore: ^5.6.7

  shared_preferences: ^2.3.3

  go_router: ^14.6.2

  intl: ^0.19.0

  uuid: ^4.5.1



dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.3



flutter_launcher_icons:

  android: true

  ios: true

  web:

    generate: true

    image_path: assets/images/app_logo.png

    background_color: "#000000"

    theme_color: "#000000"

  windows:

    generate: true

    image_path: assets/images/app_logo.png

    icon_size: 256

  macos:

    generate: true

    image_path: assets/images/app_logo.png

  image_path: assets/images/app_logo.png

  adaptive_icon_background: "#000000"

  adaptive_icon_foreground: assets/images/app_logo.png



flutter:

  uses-material-design: true

  assets:

    - assets/images/app_logo.png

